    region: null

# 이벤트 타입 정의
event_types:
  gtx_announcement:
    description: "GTX 관련 발표 및 착공"
    default_impact: "high"
  
  redevelopment_approval:
    description: "재개발/뉴타운 승인 및 조합 설립"
    default_impact: "high"
  
  interest_rate:
    description: "한국은행 기준금리 변동"
    default_impact: "high"
  
  loan_regulation:
    description: "대출 규제 변화 (DSR, LTV 등)"
    default_impact: "medium"
  
  sales_restriction:
    description: "분양 및 전매 규제 변화"
    default_impact: "medium"
  
  supply_announcement:
    description: "대규모 공급 계획 발표"
    default_impact: "medium"
